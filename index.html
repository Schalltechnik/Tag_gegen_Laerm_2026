<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Stempelpass</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      background: #e8eedf;
      transition: background 1.2s ease;
    }
    body.done {
      background: #b8d98a;
    }

    #title {
      font-size: 2.2rem;
      letter-spacing: 0.12em;
      color: #3a6b0e;
      text-align: center;
      margin-bottom: 0.3rem;
      font-weight: 700;
      text-transform: uppercase;
      transition: color 1s;
    }
    body.done #title {
      color: #2a4e08;
      animation: glow 2s infinite;
    }
    #subtitle {
      color: #5a7a3a;
      font-size: 0.82rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      text-align: center;
      margin-bottom: 0.6rem;
    }

    .top-bar {
      width: 100%;
      max-width: 460px;
      height: 5px;
      background: linear-gradient(90deg, #3a6b0e, #8dc63f);
      border-radius: 3px;
      margin-bottom: 1.4rem;
    }

    .card {
      background: #ffffff;
      border: 1px solid #c0d4a0;
      border-radius: 12px;
      padding: 2.5rem 2rem;
      max-width: 460px;
      width: 100%;
      box-shadow: 0 2px 16px rgba(58,107,14,0.12);
      transition: all 1s ease;
    }
    body.done .card {
      background: #e8f5d0;
      border-color: #5a8f1a;
      box-shadow: 0 0 40px rgba(58,107,14,0.35), 0 2px 16px rgba(58,107,14,0.15);
    }

    .progress-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .progress-label { color: #6b7a60; font-size: 0.8rem; }
    .progress-count { color: #3a6b0e; font-size: 0.8rem; font-weight: bold; }
    .progress-track {
      background: #d4e4b8;
      border-radius: 999px;
      height: 7px;
      overflow: hidden;
      margin-bottom: 1.8rem;
    }
    .progress-fill {
      background: linear-gradient(90deg, #3a6b0e, #8dc63f);
      height: 100%;
      border-radius: 999px;
      width: 0%;
      transition: width 0.6s ease;
    }

    .station {
      background: #f2f8ea;
      border: 1px solid #c8dca8;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
      transition: all 0.5s ease;
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    .station.stamped {
      background: #dff0c0;
      border-color: #5a8f1a;
    }
    .stamp-icon { flex-shrink: 0; }
    .stamp-icon svg { display: block; }
    .station-body { flex: 1; }
    .station-label {
      color: #2c2c2c;
      font-weight: 700;
      font-size: 0.95rem;
      letter-spacing: 0.03em;
      margin-bottom: 0.5rem;
      transition: color 0.4s;
    }
    .station.stamped .station-label { color: #3a6b0e; }
    .station-code-hint { margin-left: 8px; font-size: 0.8rem; color: #5a8f1a; font-weight: normal; }

    .input-row { display: flex; gap: 0.5rem; align-items: center; }
    input[type=number] {
      background: #ffffff;
      border: 1px solid #a8c080;
      border-radius: 6px;
      color: #2c2c2c;
      font-size: 1.05rem;
      padding: 0.5rem 0.8rem;
      flex: 1;
      outline: none;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      transition: border 0.2s;
      -moz-appearance: textfield;
    }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    input[type=number]:focus { border-color: #3a6b0e; box-shadow: 0 0 0 2px rgba(58,107,14,0.18); }

    .btn-stamp {
      background: linear-gradient(135deg, #3a6b0e, #5a8f1a);
      color: white;
      border: none;
      border-radius: 6px;
      padding: 0.5rem 1.2rem;
      font-size: 0.9rem;
      cursor: pointer;
      font-family: 'Segoe UI', Arial, sans-serif;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.1s;
      white-space: nowrap;
    }
    .btn-stamp:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-stamp:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .error-msg { color: #c0392b; font-size: 0.78rem; margin-top: 4px; }

    #completion {
      display: none;
      margin-top: 1.8rem;
      text-align: center;
      padding: 1.2rem;
      background: #c8e896;
      border-radius: 10px;
      border: 2px solid #3a6b0e;
    }
    #completion .emoji { font-size: 2rem; margin-bottom: 0.3rem; }
    #completion .done-title { color: #2a4e08; font-weight: 700; font-size: 1.05rem; letter-spacing: 0.04em; }
    #completion .done-codes { color: #3a6b0e; font-size: 0.85rem; margin-top: 4px; }
    #completion .done-id { color: #7a9a5a; font-size: 0.72rem; margin-top: 6px; font-family: 'Courier New', monospace; }

    #btn-reset {
      margin-top: 1.2rem;
      background: transparent;
      color: #7a9a5a;
      border: 1px solid #a8c080;
      border-radius: 6px;
      padding: 0.35rem 1rem;
      font-size: 0.82rem;
      cursor: pointer;
      font-family: 'Segoe UI', Arial, sans-serif;
      transition: color 0.2s, border-color 0.2s;
    }
    #btn-reset:hover { color: #c0392b; border-color: #c0392b; }

    @keyframes stamp {
      0%   { transform: scale(1.5) rotate(-8deg); opacity: 0.5; }
      60%  { transform: scale(0.9) rotate(2deg);  opacity: 1; }
      100% { transform: scale(1)   rotate(0deg);  opacity: 1; }
    }
    @keyframes glow {
      0%,100% { text-shadow: 0 0 8px rgba(58,107,14,0.5); }
      50%      { text-shadow: 0 0 22px rgba(58,107,14,0.9), 0 0 40px rgba(141,198,63,0.5); }
    }
    .stamp-anim { animation: stamp 0.6s cubic-bezier(.36,.07,.19,.97); }
  </style>
</head>
<body>

  <div id="title">Stempelpass</div>
  <div id="subtitle">Digitaler Nachweis · <span id="count">0</span>/3 Stempel</div>
  <div class="top-bar"></div>

  <div class="card">
    <div class="progress-row">
      <span class="progress-label">Fortschritt</span>
      <span class="progress-count"><span id="count2">0</span> / 3</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="progress-fill"></div>
    </div>

    <!-- Station 1 -->
    <div class="station" id="station-s1">
      <div class="stamp-icon" id="icon-s1">
        <svg viewBox="0 0 80 80" width="64" height="64">
          <polygon id="hex-s1"
            points="40,6 52,14 66,14 74,26 74,40 74,54 66,66 52,66 40,74 28,66 14,66 6,54 6,40 6,26 14,14 28,14"
            fill="transparent" stroke="#a8c080" stroke-width="2.5"
            style="transition: fill 0.4s, stroke 0.4s"/>
          <text id="hextext-s1" x="40" y="46" text-anchor="middle" font-size="22" fill="#a8c080" font-family="serif">?</text>
        </svg>
      </div>
      <div class="station-body">
        <div class="station-label" id="label-s1">Station 1</div>
        <div class="input-row" id="input-row-s1">
          <input type="number" id="input-s1" placeholder="Messwert [dB] eingeben…" />
          <button class="btn-stamp" onclick="handleSubmit('s1')">Stempeln</button>
        </div>
        <div class="error-msg" id="error-s1"></div>
      </div>
    </div>

    <!-- Station 2 -->
    <div class="station" id="station-s2">
      <div class="stamp-icon" id="icon-s2">
        <svg viewBox="0 0 80 80" width="64" height="64">
          <polygon id="hex-s2"
            points="40,6 52,14 66,14 74,26 74,40 74,54 66,66 52,66 40,74 28,66 14,66 6,54 6,40 6,26 14,14 28,14"
            fill="transparent" stroke="#a8c080" stroke-width="2.5"
            style="transition: fill 0.4s, stroke 0.4s"/>
          <text id="hextext-s2" x="40" y="46" text-anchor="middle" font-size="22" fill="#a8c080" font-family="serif">?</text>
        </svg>
      </div>
      <div class="station-body">
        <div class="station-label" id="label-s2">Station 2</div>
        <div class="input-row" id="input-row-s2">
          <input type="number" id="input-s2" placeholder="Messwert [dB] eingeben…" />
          <button class="btn-stamp" onclick="handleSubmit('s2')">Stempeln</button>
        </div>
        <div class="error-msg" id="error-s2"></div>
      </div>
    </div>

    <!-- Station 3 -->
    <div class="station" id="station-s3">
      <div class="stamp-icon" id="icon-s3">
        <svg viewBox="0 0 80 80" width="64" height="64">
          <polygon id="hex-s3"
            points="40,6 52,14 66,14 74,26 74,40 74,54 66,66 52,66 40,74 28,66 14,66 6,54 6,40 6,26 14,14 28,14"
            fill="transparent" stroke="#a8c080" stroke-width="2.5"
            style="transition: fill 0.4s, stroke 0.4s"/>
          <text id="hextext-s3" x="40" y="46" text-anchor="middle" font-size="22" fill="#a8c080" font-family="serif">?</text>
        </svg>
      </div>
      <div class="station-body">
        <div class="station-label" id="label-s3">Station 3</div>
        <div class="input-row" id="input-row-s3">
          <input type="number" id="input-s3" placeholder="Messwert [dB] eingeben…" />
          <button class="btn-stamp" onclick="handleSubmit('s3')">Stempeln</button>
        </div>
        <div class="error-msg" id="error-s3"></div>
      </div>
    </div>

    <!-- Completion -->
    <div id="completion">
      <div class="emoji">🎉</div>
      <div class="done-title">Alle Stempel gesammelt!</div>
      <div class="done-codes" id="done-codes"></div>
      <div class="done-id" id="done-id"></div>
    </div>
  </div>

  <button id="btn-reset" onclick="handleReset()">↺ Zurücksetzen</button>

  <script>
    // ─── CONFIG ───────────────────────────────────────────────────────────────
    const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbzwON6baGSfUMD0Aj0ZgZ_wxzENzeHcYGducGTPgBmdijRUpFZ_JS0PMIXXGHb2g6zafA/exec';
    const MIN_VAL = 30;
    const MAX_VAL = 100;
    // ─────────────────────────────────────────────────────────────────────────

    const STATIONS = ['s1', 's2', 's3'];
    let state = { values: {s1:'',s2:'',s3:''}, submitted: {s1:false,s2:false,s3:false} };

    function getOrCreateAnonId() {
      const KEY = 'stempelpass-anon-id';
      let id = null;
      try { id = localStorage.getItem(KEY); } catch(e) {}
      if (!id) {
        id = 'SP-' +
          Math.random().toString(36).slice(2, 10) + '-' +
          Math.random().toString(36).slice(2, 6);
        try { localStorage.setItem(KEY, id); } catch(e) {}
      }
      return id;
    }
    const ANON_ID = getOrCreateAnonId();
    const SESSION_ID = 'sess-' + Math.random().toString(36).slice(2, 10);

    try {
      const saved = localStorage.getItem('stempelpass-data');
      if (saved) state = JSON.parse(saved);
    } catch(e) {}

    function save() {
      try { localStorage.setItem('stempelpass-data', JSON.stringify(state)); } catch(e) {}
    }

    function logToSheets(station, value) {
      const params = new URLSearchParams({
        timestamp: new Date().toISOString(),
        anonId:    ANON_ID,
        sessionId: SESSION_ID,
        station:   station,
        value:     value,
        userAgent: navigator.userAgent
      });
      fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: params.toString()
      }).catch(() => {});
    }

    function handleSubmit(id) {
      const input = document.getElementById('input-' + id);
      const val = input.value.trim();
      const num = Number(val);
      const errEl = document.getElementById('error-' + id);

      if (val === '' || isNaN(num)) {
        errEl.textContent = 'Bitte eine gültige Zahl eingeben.';
        return;
      }
      if (num < MIN_VAL || num > MAX_VAL) {
        errEl.textContent = `Wert muss zwischen ${MIN_VAL} und ${MAX_VAL} dB liegen.`;
        return;
      }

      errEl.textContent = '';
      state.values[id] = val;
      state.submitted[id] = true;
      save();
      logToSheets(id, val);
      renderStation(id);
      updateProgress();
      checkDone();
    }

    function handleReset() {
      state = { values: {s1:'',s2:'',s3:''}, submitted: {s1:false,s2:false,s3:false} };
      save();
      STATIONS.forEach(id => renderStation(id));
      updateProgress();
      document.body.classList.remove('done');
      document.getElementById('completion').style.display = 'none';
    }

    function renderStation(id) {
      const done = state.submitted[id];
      const stationEl = document.getElementById('station-' + id);
      const hex = document.getElementById('hex-' + id);
      const hextext = document.getElementById('hextext-' + id);
      const inputRow = document.getElementById('input-row-' + id);
      const label = document.getElementById('label-' + id);
      const icon = document.getElementById('icon-' + id);

      if (done) {
        stationEl.classList.add('stamped');
        hex.setAttribute('fill', '#5a8f1a');
        hex.setAttribute('stroke', '#3a6b0e');
        hextext.setAttribute('fill', 'white');
        hextext.textContent = '✓';
        icon.style.filter = 'drop-shadow(0 0 8px rgba(58,107,14,0.55))';
        icon.classList.remove('stamp-anim');
        void icon.offsetWidth;
        icon.classList.add('stamp-anim');
        setTimeout(() => icon.classList.remove('stamp-anim'), 700);
        inputRow.style.display = 'none';
        let hint = label.querySelector('.station-code-hint');
        if (!hint) {
          hint = document.createElement('span');
          hint.className = 'station-code-hint';
          label.appendChild(hint);
        }
        hint.textContent = '· Code: ' + state.values[id];
      } else {
        stationEl.classList.remove('stamped');
        hex.setAttribute('fill', 'transparent');
        hex.setAttribute('stroke', '#a8c080');
        hextext.setAttribute('fill', '#a8c080');
        hextext.textContent = '?';
        icon.style.filter = 'none';
        inputRow.style.display = 'flex';
        document.getElementById('input-' + id).value = state.values[id] || '';
        const hint = label.querySelector('.station-code-hint');
        if (hint) hint.remove();
      }
    }

    function updateProgress() {
      const n = STATIONS.filter(id => state.submitted[id]).length;
      document.getElementById('count').textContent = n;
      document.getElementById('count2').textContent = n;
      document.getElementById('progress-fill').style.width = (n / 3 * 100) + '%';
    }

    function checkDone() {
      const allDone = STATIONS.every(id => state.submitted[id]);
      if (allDone) {
        document.body.classList.add('done');
        const comp = document.getElementById('completion');
        comp.style.display = 'block';
        document.getElementById('done-codes').textContent =
          'Codes: ' + state.values.s1 + ' · ' + state.values.s2 + ' · ' + state.values.s3;
        document.getElementById('done-id').textContent = 'ID: ' + ANON_ID;
      }
    }

    STATIONS.forEach(id => renderStation(id));
    updateProgress();
    checkDone();
  </script>
</body>
</html>
